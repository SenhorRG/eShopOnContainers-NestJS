{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eshop-nestjs.serviceFullname" (dict "root" $ "name" $name) }}
  labels:
    {{- include "eshop-nestjs.labels" $ | nindent 4 }}
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/component: nest-service
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $.Release.Name }}
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/name: {{ $name }}
        app.kubernetes.io/component: nest-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: {{ $name }}
          image: {{ include "eshop-nestjs.image" (dict "root" $ "svc" $svc) }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
            {{- if $svc.grpcPort }}
            - name: grpc
              containerPort: {{ $svc.grpcPort }}
            {{- end }}
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: {{ $svc.port | quote }}
            {{- if $svc.grpcPort }}
            - name: GRPC_PORT
              value: {{ $svc.grpcPort | quote }}
            {{- end }}
            - name: ESHOP_RABBITMQ_HOST
              value: {{ $.Values.global.rabbitmq.host | quote }}
            - name: ESHOP_RABBITMQ_PORT
              value: {{ $.Values.global.rabbitmq.port | quote }}
            - name: ESHOP_RABBITMQ_USERNAME
              value: {{ $.Values.global.rabbitmq.username | quote }}
            - name: ESHOP_RABBITMQ_PASSWORD
              value: {{ $.Values.global.rabbitmq.password | quote }}
            - name: ESHOP_RABBITMQ_VHOST
              value: {{ $.Values.global.rabbitmq.vhost | quote }}
            - name: ESHOP_REDIS_URL
              value: {{ $.Values.global.redis.url | quote }}
            {{- if and (eq $name "mobile-bff") $svc.bffProxies }}
            - name: ESHOP_BFF_PROXY_CATALOG_URL
              value: {{ include "eshop-nestjs.serviceDnsName" (dict "root" $ "target" $svc.bffProxies.catalog "port" (index $.Values.services $svc.bffProxies.catalog).port) | quote }}
            - name: ESHOP_BFF_PROXY_ORDERING_URL
              value: {{ include "eshop-nestjs.serviceDnsName" (dict "root" $ "target" $svc.bffProxies.ordering "port" (index $.Values.services $svc.bffProxies.ordering).port) | quote }}
            - name: ESHOP_BFF_PROXY_IDENTITY_URL
              value: {{ include "eshop-nestjs.serviceDnsName" (dict "root" $ "target" $svc.bffProxies.identity "port" (index $.Values.services $svc.bffProxies.identity).port) | quote }}
            {{- if $svc.bffProxies.basket }}
            - name: ESHOP_BFF_PROXY_BASKET_URL
              value: {{ include "eshop-nestjs.serviceDnsName" (dict "root" $ "target" $svc.bffProxies.basket "port" (index $.Values.services $svc.bffProxies.basket).port) | quote }}
            {{- end }}
            - name: ESHOP_BFF_PROXY_IDENTITY_ENABLED
              value: "true"
            {{- end }}
            {{- $db := index $.Values.databaseSecrets.entries $name }}
            {{- if $db }}
            - name: {{ $db.databaseUrlEnv }}
              valueFrom:
                secretKeyRef:
                  name: {{ $db.secretName | default (printf "%s-db" $name) }}
                  key: databaseUrl
            {{- end }}
            {{- range $key, $val := $svc.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: {{ $svc.healthPath }}
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ $svc.healthPath }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- if $svc.resources }}
            {{- toYaml $svc.resources | nindent 12 }}
            {{- else }}
            {{- toYaml $.Values.defaultResources | nindent 12 }}
            {{- end }}
{{- end }}
{{- end }}
