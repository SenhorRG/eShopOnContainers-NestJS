{{- if .Values.serviceMonitor.enabled }}
{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "eshop-nestjs.serviceFullname" (dict "root" $ "name" $name) }}
  labels:
    {{- include "eshop-nestjs.labels" $ | nindent 4 }}
    app.kubernetes.io/name: {{ $name }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $.Release.Name }}
      app.kubernetes.io/name: {{ $name }}
  endpoints:
    - port: http
      path: {{ $svc.metricsPath | default $svc.healthPath }}
      interval: {{ $.Values.serviceMonitor.interval }}
{{- end }}
{{- end }}
{{- end }}
