{{- if .Values.podDisruptionBudget.enabled }}
{{- range $name, $svc := .Values.services }}
{{- if and $svc.enabled (index $.Values.podDisruptionBudget.services $name | default false) }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "eshop-nestjs.serviceFullname" (dict "root" $ "name" $name) }}
  labels:
    {{- include "eshop-nestjs.labels" $ | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $.Release.Name }}
      app.kubernetes.io/name: {{ $name }}
{{- end }}
{{- end }}
{{- end }}
