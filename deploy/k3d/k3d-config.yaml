# k3d cluster for local Kubernetes study (ingress-ready load balancer on 80/443).
apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: eshop-dev
servers: 1
agents: 0
ports:
  - port: 80:80
    nodeFilters:
      - loadbalancer
  - port: 443:443
    nodeFilters:
      - loadbalancer
options:
  k3d:
    wait: true
    timeout: 120s
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:*
