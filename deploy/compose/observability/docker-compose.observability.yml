x-eshop-compose-identification: &eshop-compose-identification
  com.eshop.project: eshop-nestjs
  com.eshop.orchestrator: docker-compose
  com.eshop.stack: nestjs-monorepo

services:
  jaeger:
    image: jaegertracing/all-in-one:1.57
    profiles: ["dev"]
    labels:
      <<: *eshop-compose-identification
      com.eshop.compose.service: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"

  loki:
    image: grafana/loki:3.0.0
    profiles: ["dev"]
    labels:
      <<: *eshop-compose-identification
      com.eshop.compose.service: loki
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.0.0
    profiles: ["dev"]
    labels:
      <<: *eshop-compose-identification
      com.eshop.compose.service: promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./observability/promtail-config.yaml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.98.0
    profiles: ["dev"]
    labels:
      <<: *eshop-compose-identification
      com.eshop.compose.service: otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "14317:4317"
      - "14318:4318"
      - "13133:13133"
      - "8889:8889"
    depends_on:
      - jaeger
      - loki
      - prometheus

  prometheus:
    image: prom/prometheus:v2.53.0
    profiles: ["dev"]
    labels:
      <<: *eshop-compose-identification
      com.eshop.compose.service: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9099:9090"

  grafana:
    image: grafana/grafana:11.2.0
    profiles: ["dev"]
    labels:
      <<: *eshop-compose-identification
      com.eshop.compose.service: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3200:3000"
    depends_on:
      - prometheus
      - loki

volumes:
  loki-data:
