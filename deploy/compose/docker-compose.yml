name: eshop-nestjs

# Compose project prefix: eshop-nestjs_*

x-eshop-compose-identification: &eshop-compose-identification
  com.eshop.project: eshop-nestjs
  com.eshop.orchestrator: docker-compose
  com.eshop.stack: nestjs-monorepo

# Profiles:
# - infra-only: Postgres + Redis + RabbitMQ
# - dev: core infra + merge observability/docker-compose.observability.yml when needed
# - e2e: same infra footprint as infra-only — `COMPOSE_PROFILES=e2e` for Playwright dependency stacks
# - stack: infra + Nest apps + storefront — merge `docker-compose.stack.yml`

services:
  postgres:
    image: pgvector/pgvector:pg16
    profiles: ["infra-only", "dev", "e2e", "stack"]
    labels:
      <<: *eshop-compose-identification
      com.eshop.compose.service: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - ./initdb:/docker-entrypoint-initdb.d:ro
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    profiles: ["infra-only", "dev", "e2e", "stack"]
    command: redis-server --appendonly yes
    labels:
      <<: *eshop-compose-identification
      com.eshop.compose.service: redis
    restart: unless-stopped
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    profiles: ["infra-only", "dev", "e2e", "stack"]
    labels:
      <<: *eshop-compose-identification
      com.eshop.compose.service: rabbitmq
    restart: unless-stopped
    ports:
      - "55672:5672"
      - "55673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s

volumes:
  postgres_data:
    name: ${COMPOSE_PROJECT_NAME:-eshop-nestjs}_postgres_data
  redis_data:
    name: ${COMPOSE_PROJECT_NAME:-eshop-nestjs}_redis_data
