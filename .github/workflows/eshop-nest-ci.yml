name: eshop-nest-ci

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      check_openapi_live:
        description: "Run live OpenAPI drift check (requires running APIs)"
        type: boolean
        default: false
      publish_ghcr:
        description: "Publish catalog + storefront images to GHCR (needs packages:write)"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: "9.15.0"
  NODE_VERSION: "20.19.0"

jobs:
  build-test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ env.PNPM_VERSION }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-${{ env.PNPM_VERSION }}-node-${{ env.NODE_VERSION }}-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-1.60-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-1.60-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (infrastructure + domains + Nest apps + web)
        run: pnpm run build

      - name: OpenAPI snapshot validation
        run: pnpm run contracts:check

      - name: OpenAPI breaking check (oasdiff when available)
        run: pnpm run contracts:oasdiff
        continue-on-error: true

      - name: Playwright smoke (no stack required)
        run: pnpm run test:smoke

      - name: Unit tests (infrastructure + domains + apps)
        run: pnpm run test:unit

      - name: Integration (Testcontainers — Docker)
        run: pnpm run test:integration

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @eshop/e2e-tests exec playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @eshop/e2e-tests exec playwright install-deps chromium

      - name: Playwright E2E
        run: pnpm run test:e2e
        env:
          E2E_RUN_HEALTH: "0"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          if-no-files-found: ignore

  check-openapi-live:
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.check_openapi_live) ||
      vars.CHECK_OPENAPI_LIVE == 'true'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ env.PNPM_VERSION }}-openapi-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-${{ env.PNPM_VERSION }}-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build Nest apps (OpenAPI export)
        run: pnpm run build:nest

      - name: Live OpenAPI drift check
        run: pnpm run contracts:check:live
        env:
          CHECK_OPENAPI_LIVE: "1"

  docker-smoke:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Nest catalog image (validation only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.nest.template
          push: false
          load: true
          tags: eshop/catalog-service:ci
          build-args: |
            PNPM_FILTER=@eshop/catalog-service
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan (catalog image — informational)
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true
        with:
          image-ref: eshop/catalog-service:ci
          format: table
          exit-code: "0"

      - name: Build storefront image (validation only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.storefront
          push: false
          tags: eshop/storefront-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-ghcr:
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_ghcr)
    needs: [build-test, docker-smoke]
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Lowercase owner for GHCR
        run: |
          o="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "GHCR_OWNER=${o}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (catalog)
        id: meta-catalog
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.GHCR_OWNER }}/eshop/catalog-service
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Push catalog-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.nest.template
          push: true
          tags: ${{ steps.meta-catalog.outputs.tags }}
          labels: ${{ steps.meta-catalog.outputs.labels }}
          build-args: |
            PNPM_FILTER=@eshop/catalog-service

      - name: Extract metadata (storefront)
        id: meta-storefront
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.GHCR_OWNER }}/eshop/storefront-web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Push storefront-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.storefront
          push: true
          tags: ${{ steps.meta-storefront.outputs.tags }}
          labels: ${{ steps.meta-storefront.outputs.labels }}
